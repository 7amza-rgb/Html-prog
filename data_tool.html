<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Canvas Particles</title>
  <style>
    html, body { margin: 0; background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font: 13px/1 'Courier New', monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">Click to repel · Move mouse to attract</div>
  <canvas id="c"></canvas>
  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    let W = c.width = window.innerWidth;
    let H = c.height = window.innerHeight;
    window.addEventListener('resize', () => { W = c.width = window.innerWidth; H = c.height = window.innerHeight; });

    const N = 120;
    const COLORS = ['#6366f1','#8b5cf6','#ec4899','#06b6d4','#22c55e'];
    let mouse = { x: W/2, y: H/2, click: false };

    const particles = Array.from({ length: N }, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
      r: Math.random() * 3 + 1.5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
    }));

    c.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    c.addEventListener('mousedown', () => { mouse.click = true; });
    c.addEventListener('mouseup',   () => { mouse.click = false; });

    function draw() {
      ctx.fillStyle = 'rgba(10,10,15,0.15)';
      ctx.fillRect(0, 0, W, H);
      for (const p of particles) {
        const dx = mouse.x - p.x, dy = mouse.y - p.y;
        const dist = Math.hypot(dx, dy) || 1;
        const force = Math.min(800 / (dist * dist), 4);
        const sign = mouse.click ? -1 : 1;
        p.vx += sign * force * dx / dist * 0.08;
        p.vy += sign * force * dy / dist * 0.08;
        p.vx *= 0.96; p.vy *= 0.96;
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 8; ctx.shadowColor = p.color;
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
